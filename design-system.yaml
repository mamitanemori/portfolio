# ============================================================
# Design System Prompt (Abstract / Reusable)
# ============================================================
# Visual identity extracted from a refined AI developer portfolio.
# Abstracted from specific content so it can be applied to any project.
# ============================================================

meta:
  name: "Cool Minimal Editorial"
  description: >
    Understated and architectural aesthetic with a Japanese editorial sensibility.
    Combines serif typography (Shippori Mincho) with monospace UI labels,
    a warm off-white base, and a muted gold accent for a quietly sophisticated feel.
  keywords:
    - minimal
    - editorial
    - architectural
    - serif
    - monospace
    - warm-neutral
    - refined
    - japanese

# --------------------------------------------------
# Color Palette
# --------------------------------------------------
colors:
  accent:
    base: "#c8a882"          # Warm gold / muted amber
    description: >
      Used very sparingly — section divider lines, skill group titles,
      hero eyebrow lines. Never as a fill or dominant surface.

  background:
    primary: "#faf9f7"       # Warm off-white (main page bg)
    secondary: "#f3f2ef"     # Slightly deeper warm gray (hover, bg2)
    white: "#ffffff"         # Pure white (card hover state, modal bg)
    description: >
      Near-white backgrounds with a slight warm/cream undertone.
      Surfaces are distinguished by extremely subtle tonal shifts,
      not by heavy contrast.

  text:
    primary: "#1a1917"       # Near-black with warm undertone
    muted: "#999896"         # Warm mid-gray for secondary text, labels
    inverse: "rgba(255,255,255,0.92)"   # Off-white on dark bg (contact section)
    inverse_muted: "rgba(255,255,255,0.5)"  # Dimmed white for links on dark
    description: >
      Warm-tinted neutrals throughout. Primary text avoids pure black.
      Muted text carries a slight warm undertone (not cool gray).

  border:
    default: "#e8e6e1"       # Warm light gray — primary borders
    soft: "#f3f2ef"          # Almost invisible — section backgrounds
    inverse: "rgba(255,255,255,0.08)"  # Subtle white border on dark bg
    description: >
      Borders are structural but unobtrusive. Warm tint prevents coldness.
      On dark backgrounds, borders use low-opacity white.

  contact_bg: "#1a1917"      # Same as text.primary — used as dark section bg

# --------------------------------------------------
# Typography
# --------------------------------------------------
typography:
  font_strategy: "serif-display + monospace-ui"
  description: >
    Display headings use Shippori Mincho (Japanese serif) for editorial character.
    All UI elements — nav links, labels, tags, section headers, CTAs —
    use DM Mono for a precise, architectural feel.
    Body copy uses Noto Sans JP (light weight) for comfortable reading.

  font_families:
    display:
      stack: '"Shippori Mincho", "Hiragino Mincho ProN", serif'
      weight_range: [400, 500]
      usage: "Hero h1, section h2/h3, modal titles, about quote"
    ui:
      stack: '"DM Mono", monospace'
      weight_range: [300, 400]
      usage: "Nav links, section labels, filter buttons, tags, CTAs, eyebrows, footer"
    body:
      stack: '"Noto Sans JP", system-ui, sans-serif'
      weight_range: [300, 400]
      usage: "Descriptive paragraphs, card descriptions, meta text"

  scale:
    hero_h1:
      size: "clamp(3rem, 8vw, 6.5rem)"
      weight: 400
      line_height: 1.15
      letter_spacing: "0.04em"
      font: display
      description: "Large and airy. Not bold — weight is carried by size alone."
    section_h2:
      size: "clamp(1.8rem, 4vw, 3rem)"
      weight: 400
      line_height: 1.35
      letter_spacing: "0.04em"
      font: display
    body:
      size: "14px"
      weight: 300
      line_height: 2.1
      font: body
      description: "Light weight, generous line-height for calm readability."
    ui_label:
      size: "10px"
      weight: 400
      line_height: 1.4
      letter_spacing: "0.15em"
      text_transform: uppercase
      font: ui
      description: "Section tags, eyebrows, nav links. All-caps + wide tracking."
    ui_small:
      size: "9px–11px"
      weight: 400
      letter_spacing: "0.10em–0.12em"
      text_transform: uppercase
      font: ui
      description: "Work tags, filter buttons, footer text."

# --------------------------------------------------
# Spacing & Layout
# --------------------------------------------------
spacing:
  unit: "8px"
  scale:
    xs: "4px"
    sm: "8px"
    md: "16px"
    lg: "24px"
    xl: "40px"
    xxl: "56px"
    section: "80px–100px"
  description: >
    Generous vertical rhythm throughout. Sections breathe with
    80–100px top/bottom padding. Internal component gaps are tight
    (8–16px), creating density within cards while sections feel spacious.

layout:
  max_width: "1080px"
  content_padding: "40px"
  grid:
    works:
      columns: 2
      gap: "1px"
      background: "var(--border)"  # Creates hairline gutter effect
      border: "1px solid var(--border)"
      description: "Grid lines are 1px gaps — background shows through as dividers."
    skills:
      columns: "200px 1fr"
      gap: "80px"
      inner_columns: 3
    about:
      columns: "200px 1fr"
      gap: "80px"
    contact:
      columns: "200px 1fr"
      gap: "80px"

# --------------------------------------------------
# Component Styles
# --------------------------------------------------
components:

  navigation:
    height: "52px"
    background: "rgba(250, 249, 247, 0.88)"
    backdrop_filter: "blur(16px)"
    border_bottom: "1px solid var(--border)"
    position: sticky top
    logo:
      font: ui
      size: "11px"
      letter_spacing: "0.12em"
      opacity: 0.7
    links:
      font: ui
      size: "10px"
      letter_spacing: "0.10em"
      text_transform: uppercase
      color: muted
      hover_color: primary
    description: >
      Frosted glass nav. Logo and links both use DM Mono.
      Links are muted until hover. No active state decoration.

  hero_eyebrow:
    style: "line + label"
    line:
      width: "24px"
      height: "1px"
      color: accent
    label:
      font: ui
      size: "10px"
      letter_spacing: "0.15em"
      text_transform: uppercase
      color: muted
    description: >
      A short horizontal accent line sits left of the eyebrow label.
      Used above the hero h1 and as a section-opener on sticky sidebars.

  section_label:
    layout: "horizontal rule with label"
    structure: "[label text] ──────── [count/meta]"
    font: ui
    size: "10px"
    letter_spacing: "0.15em"
    text_transform: uppercase
    color: muted
    line:
      flex: 1
      height: "1px"
      color: border
    description: >
      Section headers are minimal horizontal rules with a label on the left
      and optional count on the right. No large decorative headings.

  filter_tabs:
    style: "underline tabs (not pills)"
    layout: "row flush to a bottom border"
    inactive:
      color: muted
      border_bottom: "2px solid transparent"
    active:
      color: text.primary
      border_bottom: "2px solid var(--accent)"
    font: ui
    size: "10px"
    letter_spacing: "0.10em"
    text_transform: uppercase
    padding: "10px 18px"
    description: >
      Filter buttons sit on a shared bottom border. Active state is
      an accent-colored underline — not a pill or filled background.

  work_card:
    background: "var(--bg)"
    hover_background: "#ffffff"
    transition: "background 0.2s"
    thumb:
      aspect_ratio: "16/9"
      overflow: hidden
      img_transition: "transform 0.7s cubic-bezier(0.25,0.1,0.25,1), opacity 0.3s"
      hover_transform: "scale(1.04)"
      hover_opacity: 0.9
    info_bar:
      padding: "20px 24px 22px"
      border_top: "1px solid var(--border)"
      layout: "space-between baseline"
    title:
      font: body
      size: "13px"
      weight: 400
      color: text.primary
    tag:
      font: ui
      size: "9px"
      letter_spacing: "0.12em"
      text_transform: uppercase
      color: muted
      border: "1px solid var(--border)"
      border_radius: "1px"
      padding: "3px 10px"
      description: "Square-cornered tag. Deliberately not pill-shaped."
    grid_gap: "1px"
    description: >
      Cards have no shadow and no border-radius. The grid uses 1px gaps
      (the border-colored grid background) as hairline dividers.
      Hover brightens the card to white and gently scales the image.

  about_sidebar:
    position: "sticky top: 80px"
    content: hero_eyebrow style label only
    description: >
      The sidebar column contains only a small eyebrow-style label
      that sticks as you scroll. No large heading or image.

  stats:
    layout: "inline row, flex gap: 48px"
    number:
      font: display
      size: "2rem"
      weight: 400
      color: text.primary
    label:
      font: ui
      size: "9px"
      letter_spacing: "0.12em"
      text_transform: uppercase
      color: muted
    separator:
      border_top: "1px solid var(--border)"
      padding_top: "56px"
      margin_top: "56px"

  skill_group:
    title:
      font: ui
      size: "9px"
      letter_spacing: "0.14em"
      text_transform: uppercase
      color: accent
      margin_bottom: "16px"
    items:
      font: body
      size: "13px"
      weight: 300
      color: text.primary
      bullet:
        style: "3px filled circle"
        color: border
        position: "left: 0, absolute, vertically centered"
        padding_left: "12px"
    description: >
      Skill group titles use the accent color. Items have a minimal
      dot bullet using the border color — very subtle.

  cta_arrow:
    style: "animated horizontal line with arrowhead"
    layout: "flex row, gap animates on hover"
    line:
      width: "32px → 48px on hover"
      height: "1px"
      color: text.primary
      transition: "width 0.25s ease"
    arrowhead:
      style: "two sides of a square rotated 45deg"
      size: "6px"
      position: "right end of line"
    text:
      font: ui
      size: "11px"
      letter_spacing: "0.08em"
      color: text.primary
    description: >
      The CTA uses a growing horizontal line instead of a button.
      Gap between text and line animates on hover, pulling the arrow right.

  contact_link_row:
    layout: "space-between row"
    padding: "20px 0"
    border: "1px solid rgba(255,255,255,0.08) — bottom only"
    left:
      font: body
      size: "13px"
      weight: 300
      color: "rgba(255,255,255,0.5)"
      hover_color: "rgba(255,255,255,0.9)"
    right:
      font: ui
      size: "9px"
      letter_spacing: "0.12em"
      text_transform: uppercase
      color: "rgba(255,255,255,0.2)"
      hover_color: "rgba(255,255,255,0.4)"
    description: >
      Contact links are bare rows on the dark background section.
      Left = address/handle, right = platform label with arrow.

  modal:
    background: "rgba(250, 249, 247, 0.97)"
    backdrop_filter: "blur(4px)"
    padding: "80px 40px"
    close_button:
      font: ui
      size: "10px"
      position: fixed top-right
      color: muted
      hover_color: text.primary
    image:
      width: "100%"
      border: "1px solid var(--border)"
      margin_bottom: "48px"
    header:
      grid: "1fr 260px"
      gap: "56px"
      border_bottom: "1px solid var(--border)"
    title:
      font: display
      size: "clamp(1.4rem, 3vw, 2.2rem)"
      weight: 400
      letter_spacing: "0.04em"
    meta_row:
      padding: "10px 0"
      border_bottom: "1px solid var(--border)"
      key:
        font: ui
        size: "9px"
        letter_spacing: "0.12em"
        text_transform: uppercase
        color: muted
      value:
        font: body
        size: "12px"
        weight: 400
        color: text.primary
    description_text:
      font: body
      size: "14px"
      weight: 300
      color: muted
      line_height: 2.1
      max_width: "560px"

  footer:
    background: "same as contact — text.primary (#1a1917)"
    border_top: "1px solid rgba(255,255,255,0.06)"
    padding: "24px 40px"
    layout: "space-between"
    font: ui
    size: "10px"
    letter_spacing: "0.08em"
    color: "rgba(255,255,255,0.2)"

# --------------------------------------------------
# Shadows
# --------------------------------------------------
shadows:
  default: none
  description: >
    No shadows by default. The design relies entirely on borders and
    tonal background shifts for depth. Shadows are intentionally absent
    to maintain flatness and architectural clarity.

# --------------------------------------------------
# Animations & Transitions
# --------------------------------------------------
animations:
  default_duration: "0.2s"
  easing: "ease"
  effects:
    image_zoom:
      trigger: card hover
      transform: "scale(1.04)"
      opacity: 0.9
      duration: "0.7s"
      easing: "cubic-bezier(0.25, 0.1, 0.25, 1)"
      description: "Slow, smooth image scale. Feels deliberate, not snappy."
    card_bg:
      trigger: card hover
      effect: "background fades to white"
      duration: "0.2s"
    cta_arrow:
      trigger: link hover
      effect: "line width grows 32px → 48px, gap between text and line also grows"
      duration: "0.25s"
      easing: ease
    filter_tab:
      trigger: button click
      effect: "underline color appears (transparent → accent)"
      duration: "0.2s"
  description: >
    Restrained animations. The longest transition is the image zoom at 0.7s.
    Everything else is fast (0.2–0.25s). No entrance animations or scroll effects.

# --------------------------------------------------
# Mood & Atmosphere
# --------------------------------------------------
mood:
  overall: >
    Architectural and quietly confident. The design feels like the work of
    someone who has nothing to prove — spare, precise, and considered.
    Japanese editorial restraint meets European modernist typography.
  adjectives:
    - minimal
    - architectural
    - refined
    - spare
    - editorial
    - confident
    - warm-neutral
    - considered
  visual_metaphors:
    - "A well-worn Moleskine opened to a clean page"
    - "A Tokyo gallery with concrete walls and single spotlights"
    - "A Muji product catalog — nothing extra, nothing missing"
  avoid:
    - "Rounded pill buttons or bubbly shapes"
    - "Gradients or glow effects"
    - "Heavy drop shadows"
    - "Bright accent colors (pink, blue, green)"
    - "Sans-serif headings — the serif is essential"
    - "Centered layouts (except contact section)"
    - "Card borders with radius — keep corners square or nearly square"

# --------------------------------------------------
# Design Principles
# --------------------------------------------------
principles:
  - name: "Monospace as UI Language"
    description: >
      DM Mono handles every navigational and labeling element. This creates
      a consistent 'infrastructure' layer visually distinct from editorial content.

  - name: "Serif as Voice"
    description: >
      Shippori Mincho carries the personality of the site. It appears only
      where human intent is expressed — headlines, section quotes, modal titles.

  - name: "1px as Structure"
    description: >
      Borders are 1px (or 0.5px). The works grid uses 1px gaps as dividers
      rather than explicit border-radius cards. Structure comes from line, not mass.

  - name: "Accent is Restraint"
    description: >
      The warm gold accent (#c8a882) appears only on: the hero eyebrow line,
      section label dots, skill group titles, and the active filter underline.
      It is never used as a button fill or large surface color.

  - name: "No Shadows, No Radius"
    description: >
      Work cards have no border-radius and no box-shadow. Tags use border-radius: 1px
      (practically square). The only rounded element is the modal (border-radius: 8px).

  - name: "Warm Neutrality"
    description: >
      Every gray, white, and black carries a warm (yellowish) undertone.
      Cool grays are explicitly avoided. The page feels like natural paper,
      not a screen.

  - name: "Left-Anchored Information Hierarchy"
    description: >
      Section labels, about text, skills, and contact all use a 200px
      sticky sidebar column on the left. Content flows right. The left
      column is sparse — just a label or eyebrow — giving the layout
      a strong vertical axis.
